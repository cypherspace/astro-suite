<?xml version="1.0" encoding="UTF-8"?>
<!--
  Stylized recreation of Henry Norris Russell's 1914 first H-R diagram
  (Figure 1 of "Relations Between the Spectra and Other Characteristics
  of the Stars", Popular Astronomy 22, 275-294). The original is in
  the public domain (the journal's pre-1929 issues are out of copyright)
  but a high-quality scan is worth replacing this stand-in with.

  Replace this file with a true scan (e.g. from ADS / Wikimedia Commons)
  by saving over `russell1914-original.svg` or by switching the tour's
  <img> tag to `russell1914-original.jpeg` once you have one.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" font-family="serif">
  <rect width="600" height="480" fill="#f1ead2" />
  <g stroke="#3a2e1a" stroke-width="1" fill="none">
    <!-- frame -->
    <rect x="60" y="40" width="500" height="380" />
    <!-- vertical gridlines at spectral classes -->
    <line x1="60"  y1="40" x2="60"  y2="420" />
    <line x1="131" y1="40" x2="131" y2="420" stroke-dasharray="3,3" stroke-width="0.5" />
    <line x1="202" y1="40" x2="202" y2="420" stroke-dasharray="3,3" stroke-width="0.5" />
    <line x1="273" y1="40" x2="273" y2="420" stroke-dasharray="3,3" stroke-width="0.5" />
    <line x1="345" y1="40" x2="345" y2="420" stroke-dasharray="3,3" stroke-width="0.5" />
    <line x1="416" y1="40" x2="416" y2="420" stroke-dasharray="3,3" stroke-width="0.5" />
    <line x1="488" y1="40" x2="488" y2="420" stroke-dasharray="3,3" stroke-width="0.5" />
    <line x1="560" y1="40" x2="560" y2="420" />
    <!-- horizontal gridlines at abs-mag steps -->
    <line x1="60" y1="59"  x2="560" y2="59"  stroke-dasharray="3,3" stroke-width="0.5" />
    <line x1="60" y1="116" x2="560" y2="116" stroke-dasharray="3,3" stroke-width="0.5" />
    <line x1="60" y1="173" x2="560" y2="173" stroke-dasharray="3,3" stroke-width="0.5" />
    <line x1="60" y1="230" x2="560" y2="230" stroke-dasharray="3,3" stroke-width="0.5" />
    <line x1="60" y1="287" x2="560" y2="287" stroke-dasharray="3,3" stroke-width="0.5" />
    <line x1="60" y1="344" x2="560" y2="344" stroke-dasharray="3,3" stroke-width="0.5" />
    <line x1="60" y1="401" x2="560" y2="401" stroke-dasharray="3,3" stroke-width="0.5" />
  </g>
  <!-- axis labels -->
  <g fill="#3a2e1a" font-size="14">
    <text x="60"  y="438" text-anchor="middle">O</text>
    <text x="131" y="438" text-anchor="middle">B</text>
    <text x="202" y="438" text-anchor="middle">A</text>
    <text x="273" y="438" text-anchor="middle">F</text>
    <text x="345" y="438" text-anchor="middle">G</text>
    <text x="416" y="438" text-anchor="middle">K</text>
    <text x="488" y="438" text-anchor="middle">M</text>
    <text x="310" y="465" text-anchor="middle" font-style="italic">Spectral type</text>
  </g>
  <g fill="#3a2e1a" font-size="12" text-anchor="end">
    <text x="55" y="63">−5</text>
    <text x="55" y="120">−2</text>
    <text x="55" y="177">+1</text>
    <text x="55" y="234">+4</text>
    <text x="55" y="291">+7</text>
    <text x="55" y="348">+10</text>
    <text x="55" y="405">+13</text>
  </g>
  <text x="22" y="232" fill="#3a2e1a" font-size="14" font-style="italic"
        text-anchor="middle" transform="rotate(-90 22 232)">Absolute magnitude</text>
  <!-- title -->
  <text x="310" y="26" fill="#3a2e1a" font-size="16" text-anchor="middle"
        font-style="italic">Russell (1914) — after Figure 1</text>
  <!-- giant branch dots -->
  <g fill="#1a1a1a">
    <circle cx="490" cy="80"  r="2.5" />
    <circle cx="495" cy="92"  r="2.5" />
    <circle cx="478" cy="95"  r="2.5" />
    <circle cx="463" cy="105" r="2.5" />
    <circle cx="475" cy="110" r="2.5" />
    <circle cx="441" cy="125" r="2.5" />
    <circle cx="455" cy="132" r="2.5" />
    <circle cx="430" cy="145" r="2.5" />
    <circle cx="448" cy="148" r="2.5" />
    <circle cx="425" cy="160" r="2.5" />
    <circle cx="438" cy="167" r="2.5" />
    <circle cx="410" cy="175" r="2.5" />
    <circle cx="422" cy="182" r="2.5" />
    <circle cx="395" cy="190" r="2.5" />
    <circle cx="410" cy="195" r="2.5" />
    <circle cx="383" cy="200" r="2.5" />
    <circle cx="395" cy="205" r="2.5" />
    <circle cx="370" cy="208" r="2.5" />
    <circle cx="380" cy="212" r="2.5" />
    <circle cx="392" cy="218" r="2.5" />
    <circle cx="405" cy="222" r="2.5" />
    <circle cx="418" cy="225" r="2.5" />
    <circle cx="432" cy="225" r="2.5" />
    <circle cx="448" cy="218" r="2.5" />
    <circle cx="462" cy="210" r="2.5" />
    <circle cx="475" cy="200" r="2.5" />
  </g>
  <!-- main sequence diagonal band -->
  <g fill="#1a1a1a">
    <circle cx="80"  cy="60"  r="2.5" />
    <circle cx="92"  cy="78"  r="2.5" />
    <circle cx="105" cy="92"  r="2.5" />
    <circle cx="118" cy="105" r="2.5" />
    <circle cx="125" cy="118" r="2.5" />
    <circle cx="140" cy="128" r="2.5" />
    <circle cx="148" cy="140" r="2.5" />
    <circle cx="160" cy="150" r="2.5" />
    <circle cx="172" cy="158" r="2.5" />
    <circle cx="185" cy="170" r="2.5" />
    <circle cx="195" cy="180" r="2.5" />
    <circle cx="208" cy="190" r="2.5" />
    <circle cx="220" cy="198" r="2.5" />
    <circle cx="232" cy="208" r="2.5" />
    <circle cx="245" cy="220" r="2.5" />
    <circle cx="258" cy="228" r="2.5" />
    <circle cx="270" cy="238" r="2.5" />
    <circle cx="282" cy="248" r="2.5" />
    <circle cx="295" cy="258" r="2.5" />
    <circle cx="308" cy="266" r="2.5" />
    <circle cx="320" cy="276" r="2.5" />
    <circle cx="332" cy="286" r="2.5" />
    <circle cx="345" cy="296" r="2.5" />
    <circle cx="358" cy="304" r="2.5" />
    <circle cx="370" cy="314" r="2.5" />
    <circle cx="382" cy="322" r="2.5" />
    <circle cx="395" cy="330" r="2.5" />
    <circle cx="408" cy="340" r="2.5" />
    <circle cx="420" cy="348" r="2.5" />
    <circle cx="432" cy="356" r="2.5" />
    <circle cx="445" cy="364" r="2.5" />
    <circle cx="458" cy="372" r="2.5" />
    <circle cx="470" cy="378" r="2.5" />
    <circle cx="482" cy="385" r="2.5" />
    <circle cx="495" cy="392" r="2.5" />
    <circle cx="508" cy="398" r="2.5" />
    <circle cx="115" cy="120" r="2.5" />
    <circle cx="135" cy="140" r="2.5" />
    <circle cx="155" cy="160" r="2.5" />
    <circle cx="175" cy="178" r="2.5" />
    <circle cx="195" cy="195" r="2.5" />
    <circle cx="215" cy="210" r="2.5" />
    <circle cx="240" cy="225" r="2.5" />
    <circle cx="265" cy="245" r="2.5" />
    <circle cx="290" cy="265" r="2.5" />
    <circle cx="315" cy="285" r="2.5" />
    <circle cx="340" cy="305" r="2.5" />
    <circle cx="365" cy="320" r="2.5" />
    <circle cx="390" cy="335" r="2.5" />
    <circle cx="415" cy="350" r="2.5" />
    <circle cx="440" cy="370" r="2.5" />
    <circle cx="100" cy="100" r="2.5" />
    <circle cx="130" cy="130" r="2.5" />
    <circle cx="150" cy="150" r="2.5" />
    <circle cx="180" cy="172" r="2.5" />
    <circle cx="210" cy="195" r="2.5" />
    <circle cx="235" cy="218" r="2.5" />
    <circle cx="260" cy="240" r="2.5" />
    <circle cx="285" cy="262" r="2.5" />
    <circle cx="310" cy="282" r="2.5" />
  </g>
  <!-- white dwarf clump (Russell's "puzzle") -->
  <g fill="#1a1a1a">
    <circle cx="135" cy="370" r="2.5" />
    <circle cx="148" cy="378" r="2.5" />
    <circle cx="160" cy="368" r="2.5" />
    <circle cx="172" cy="380" r="2.5" />
  </g>
</svg>
