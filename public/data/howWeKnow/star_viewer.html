<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Star Comparison Viewer</title>
<style>
  /* ----------------------------------------------------------------
     Embedded teaching artefact — Stefan-Boltzmann star comparison.
     Lives inside an iframe served from /data/howWeKnow/ so its
     globals (canvas, sliders) don't collide with the host page.
     Palette mirrors the surrounding "How we know" modal:
       --bg     #0b1020   (--bg from src/style.css)
       --panel  #131a30   (--panel)
       --panel2 #1a2240   (--panel-2)
       --grid   #2a3357   (--grid)
       --fg     #e6ecff   (--fg)
       --muted  #8b95b8   (--muted)
       --accent #ffd166   (--accent, yellow)
       --acc2   #6cc4ff   (--accent-2, cyan)
     Font stack matches the host shell exactly.
     ---------------------------------------------------------------- */
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0b1020;
    color: #e6ecff;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }
  #app {
    display: grid;
    /* sliders | viewer (flex) | stats */
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    width: 100vw;
  }
  /* ---- Sliders (top) ---- */
  #controls {
    background: #131a30;
    border-bottom: 1px solid #2a3357;
    padding: 12px 18px 10px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 24px;
  }
  .ctl { display: flex; flex-direction: column; gap: 4px; }
  .ctl-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 11px;
  }
  .ctl-head .name {
    text-transform: uppercase;
    letter-spacing: 1.1px;
    color: #ffd166;
    font-weight: 600;
  }
  .ctl-head .val {
    font-variant-numeric: tabular-nums;
    color: #e6ecff;
  }
  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: #1a2240;
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #ffd166;
    cursor: pointer;
    border: 2px solid #131a30;
  }
  input[type=range]::-moz-range-thumb {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #ffd166;
    cursor: pointer;
    border: 2px solid #131a30;
  }
  #presets {
    grid-column: 1 / -1;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding-top: 4px;
  }
  .preset {
    background: #1a2240;
    border: 1px solid #2a3357;
    color: #e6ecff;
    padding: 4px 10px;
    border-radius: 14px;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.4px;
  }
  .preset:hover { background: #243057; border-color: #6cc4ff; }
  .preset b { font-weight: 600; color: #ffd166; margin-right: 4px; }

  /* ---- 3D viewer ---- */
  #viewer {
    position: relative;
    width: 100%;
    min-height: 0;
    background: #05060a;
  }
  #viewer canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }

  /* ---- Stats panel below viewer ---- */
  #stats {
    background: #131a30;
    border-top: 1px solid #2a3357;
    padding: 12px 18px 14px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  /* ---- "Too small" indicators ---- */
  .tiny-indicator {
    position: absolute;
    pointer-events: none;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 11px;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: #e6ecff;
    text-shadow: 0 0 6px #05060a, 0 0 2px #05060a;
    opacity: 0;
    transition: opacity 180ms ease;
  }
  .tiny-indicator.visible { opacity: 0.92; }
  .tiny-indicator .arrow {
    font-size: 22px;
    line-height: 1;
    margin-bottom: 2px;
    color: #ffd166;
    text-shadow: 0 0 6px rgba(0,0,0,0.9);
  }
  .tiny-indicator .msg {
    background: rgba(19, 26, 48, 0.85);
    border: 1px solid #2a3357;
    border-radius: 10px;
    padding: 3px 8px;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
  }
  .tiny-indicator.invisible-mode .arrow { display: none; }
  .star-stats {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .star-stats .star-name {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #ffd166;
    font-weight: 600;
    margin-bottom: 8px;
  }
  /* Three vertical columns: Temperature | Radius | Power */
  .col-row {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px;
    width: 100%;
    max-width: 460px;
  }
  .col {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .col .col-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: #8b95b8;
    margin-bottom: 4px;
  }
  .col .val-primary {
    font-size: 14px;
    font-variant-numeric: tabular-nums;
    line-height: 1.3;
    color: #e6ecff;
  }
  .col .val-secondary {
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    color: #8b95b8;
  }
  /* Power column gets the headline emphasis the user requested:
     a brighter label, an accent-coloured strong primary value, and
     bold strong secondary value. */
  .col.col-power .col-label {
    color: #ffd166;
    font-weight: 600;
  }
  .col.col-power .val-primary,
  .col.col-power .val-primary strong {
    color: #ffd166;
    font-weight: 700;
  }
  .col.col-power .val-secondary strong {
    color: #e6ecff;
    font-weight: 600;
  }
</style>
</head>
<body>
<div id="app">

  <!-- TOP: Sliders + presets -->
  <div id="controls">
    <div class="ctl">
      <div class="ctl-head">

    <div class="ctl">

        <span class="val"><span id="rval">1.00</span> R<sub>☉</sub></span>

      <button class="preset" data-t="3200"  data-r="2150"><b>Stephenson 2-18</b>extreme hypergiant</button>

  <!-- MIDDLE: 3D viewer -->
  <div id="viewer">

    </div>

    </div>
  </div>

  <!-- BOTTOM: stats in vertical columns under each star -->
  <div id="stats">
    <div class="star-stats" id="stats-sun">
      <div class="star-name">Sun</div>
      <div class="col-row">
        <div class="col">
          <div class="col-label">Temperature</div>
          <div class="val-primary"><span id="sun-T">5,778</span> K</div>
        </div>
        <div class="col">
          <div class="col-label">Radius</div>
          <div class="val-primary"><span id="sun-Rsun">1.00</span> R<sub>☉</sub></div>
          <div class="val-secondary"><span id="sun-Rkm">6.96×10⁵</span> km</div>
        </div>
        <div class="col col-power">
          <div class="col-label"><strong>Power</strong></div>
          <div class="val-primary"><strong><span id="sun-Lsun">1.00</span> L<sub>☉</sub></strong></div>
          <div class="val-secondary"><strong><span id="sun-LW">3.83×10²⁶</span> W</strong></div>
        </div>
      </div>
    </div>
    <div class="star-stats" id="stats-star">
      <div class="star-name">Star</div>
      <div class="col-row">
        <div class="col">
          <div class="col-label">Temperature</div>
          <div class="val-primary"><span id="star-T">5,778</span> K</div>
        </div>
        <div class="col">
          <div class="col-label">Radius</div>
          <div class="val-primary"><span id="star-Rsun">1.00</span> R<sub>☉</sub></div>
          <div class="val-secondary"><span id="star-Rkm">6.96×10⁵</span> km</div>
        </div>
        <div class="col col-power">
          <div class="col-label"><strong>Power</strong></div>
          <div class="val-primary"><strong><span id="star-Lsun">1.00</span> L<sub>☉</sub></strong></div>
          <div class="val-secondary"><strong><span id="star-LW">3.83×10²⁶</span> W</strong></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Two-part loader:
     1. Importmap rewrites the bare 'three' / 'three/addons/' imports
        the three.js addons do internally (OrbitControls, EffectComposer
        etc. all `import * as THREE from 'three'` in their own source).
     2. Our own top-level imports use the absolute CDN URLs directly,
        so Vite's pre-bundler — which scans public/ HTML for bare
        module specifiers — never sees a bare 'three' here and doesn't
        try (and fail) to resolve it as an npm dep. -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
import { EffectComposer } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js';
import { RenderPass } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js';

// ---------- Constants ----------
const T_SUN     = 5778;          // K
const R_SUN_KM  = 695700;        // km
const L_SUN_W   = 3.828e26;      // W

// ---------- Colour from temperature (Tanner Helland approximation) ----------
function kelvinToRGB(kelvin) {
  const t = kelvin / 100;
  let r, g, b;
  if (t <= 66) {
    r = 255;
    g = 99.4708025861 * Math.log(t) - 161.1195681661;
    b = t <= 19 ? 0 : 138.5177312231 * Math.log(t - 10) - 305.0447927307;
  } else {
    r = 329.698727446  * Math.pow(t - 60, -0.1332047592);
    g = 288.1221695283 * Math.pow(t - 60, -0.0755148492);
    b = 255;
  }
  const clamp = v => Math.max(0, Math.min(255, v)) / 255;
  return [clamp(r), clamp(g), clamp(b)];
}

// ---------- Three.js setup ----------
const canvas = document.getElementById('c');
const viewer = document.getElementById('viewer');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x05060a, 1);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 1000);
camera.position.set(0, 2.0, 9);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enablePan = false;
controls.minDistance = 3;
controls.maxDistance = 60;

// Subtle starfield
{
  const N = 600;
  const positions = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    const u = Math.random(), v = Math.random();
    const theta = 2 * Math.PI * u;
    const phi = Math.acos(2 * v - 1);
    const r = 200;
    positions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i*3+2] = r * Math.cos(phi);
  }
  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.6, sizeAttenuation: false, transparent: true, opacity: 0.55 });
  scene.add(new THREE.Points(geom, mat));
}

// ---------- Plasma shader ----------
const noiseGLSL = `
  vec3 mod289(vec3 x){ return x - floor(x*(1.0/289.0))*289.0; }
  vec4 mod289(vec4 x){ return x - floor(x*(1.0/289.0))*289.0; }
  vec4 permute(vec4 x){ return mod289(((x*34.0)+1.0)*x); }
  vec4 taylorInvSqrt(vec4 r){ return 1.79284291400159 - 0.85373472095314*r; }
  float snoise(vec3 v){
    const vec2 C = vec2(1.0/6.0, 1.0/3.0);
    const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
    vec3 i  = floor(v + dot(v, C.yyy));
    vec3 x0 = v - i + dot(i, C.xxx);
    vec3 g = step(x0.yzx, x0.xyz);
    vec3 l = 1.0 - g;
    vec3 i1 = min(g.xyz, l.zxy);
    vec3 i2 = max(g.xyz, l.zxy);
    vec3 x1 = x0 - i1 + C.xxx;
    vec3 x2 = x0 - i2 + C.yyy;
    vec3 x3 = x0 - D.yyy;
    i = mod289(i);
    vec4 p = permute(permute(permute(
              i.z + vec4(0.0, i1.z, i2.z, 1.0))
            + i.y + vec4(0.0, i1.y, i2.y, 1.0))
            + i.x + vec4(0.0, i1.x, i2.x, 1.0));
    float n_ = 0.142857142857;
    vec3 ns = n_*D.wyz - D.xzx;
    vec4 j = p - 49.0*floor(p*ns.z*ns.z);
    vec4 x_ = floor(j*ns.z);
    vec4 y_ = floor(j - 7.0*x_);
    vec4 x = x_*ns.x + ns.yyyy;
    vec4 y = y_*ns.x + ns.yyyy;
    vec4 h = 1.0 - abs(x) - abs(y);
    vec4 b0 = vec4(x.xy, y.xy);
    vec4 b1 = vec4(x.zw, y.zw);
    vec4 s0 = floor(b0)*2.0 + 1.0;
    vec4 s1 = floor(b1)*2.0 + 1.0;
    vec4 sh = -step(h, vec4(0.0));
    vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
    vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
    vec3 p0 = vec3(a0.xy, h.x);
    vec3 p1 = vec3(a0.zw, h.y);
    vec3 p2 = vec3(a1.xy, h.z);
    vec3 p3 = vec3(a1.zw, h.w);
    vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
    p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
    vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
    m = m*m;
    return 42.0*dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
  }
`;

const vertexShader = `
  varying vec3 vPos;
  varying vec3 vNormal;
  void main() {
    vPos = position;
    vNormal = normalize(normalMatrix * normal);
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;

const fragmentShader = `
  uniform float uTime;
  uniform vec3  uHot;
  uniform vec3  uCool;
  uniform float uIntensity;
  varying vec3 vPos;
  varying vec3 vNormal;
  ${noiseGLSL}
  float fbm(vec3 p) {
    float v = 0.0; float a = 0.5;
    for (int i = 0; i < 5; i++) { v += a*snoise(p); p *= 2.07; a *= 0.5; }
    return v;
  }
  void main() {
    vec3 q = vPos * 1.8;
    float t = uTime * 0.08;
    float big   = fbm(q + vec3(0.0, 0.0, t));
    float small = fbm(q * 3.5 + vec3(t*1.3, -t*0.7, t*0.5));
    float n = 0.55 * big + 0.45 * small;
    float h = smoothstep(-0.4, 0.7, n);
    vec3 col = mix(uCool, uHot, h);
    float flare = smoothstep(0.55, 0.95, small);
    col += uHot * flare * 0.6;
    float limb = clamp(dot(normalize(vNormal), vec3(0.0, 0.0, 1.0)), 0.0, 1.0);
    float darken = mix(0.45, 1.0, pow(limb, 0.6));
    col *= darken * uIntensity;
    gl_FragColor = vec4(col, 1.0);
  }
`;

function makeStarMaterial() {
  return new THREE.ShaderMaterial({
    uniforms: {
      uTime:      { value: 0 },
      uHot:       { value: new THREE.Color(1, 1, 1) },
      uCool:      { value: new THREE.Color(0.3, 0.1, 0) },
      uIntensity: { value: 1.0 },
    },
    vertexShader,
    fragmentShader,
  });
}

const sphereGeo = new THREE.SphereGeometry(1, 96, 64);
const sunMat  = makeStarMaterial();
const starMat = makeStarMaterial();
const sun  = new THREE.Mesh(sphereGeo, sunMat);
const star = new THREE.Mesh(sphereGeo, starMat);
scene.add(sun, star);

// ---------- Reference grid (floor) ----------
const gridVert = `
  varying vec2 vUv;
  varying vec3 vWorld;
  void main() {
    vUv = uv;
    vec4 wp = modelMatrix * vec4(position, 1.0);
    vWorld = wp.xyz;
    gl_Position = projectionMatrix * viewMatrix * wp;
  }
`;
const gridFrag = `
  uniform float uCellSize;
  uniform float uPlaneSize;
  uniform vec3  uLineColor;
  uniform vec3  uMajorColor;
  uniform float uOpacity;
  varying vec3 vWorld;
  vec2 gridDist(vec2 p, float cell) {
    vec2 g = abs(fract(p / cell - 0.5) - 0.5);
    return g;
  }
  void main() {
    vec2 p = vWorld.xz;
    float cell  = uCellSize;
    float major = uCellSize * 10.0;
    vec2 gMinor = gridDist(p, cell);
    vec2 gMajor = gridDist(p, major);
    vec2 wMinor = fwidth(p) / cell;
    vec2 wMajor = fwidth(p) / major;
    float lineMinor = 1.0 - smoothstep(0.0, wMinor.x * 1.0, gMinor.x);
    lineMinor = max(lineMinor, 1.0 - smoothstep(0.0, wMinor.y * 1.0, gMinor.y));
    float lineMajor = 1.0 - smoothstep(0.0, wMajor.x * 1.0, gMajor.x);
    lineMajor = max(lineMajor, 1.0 - smoothstep(0.0, wMajor.y * 1.0, gMajor.y));
    float minorVisibility = 1.0 - smoothstep(0.5, 1.5, max(wMinor.x, wMinor.y));
    vec3 col = uLineColor * lineMinor * minorVisibility;
    col = mix(col, uMajorColor, lineMajor);
    float a = max(lineMinor * minorVisibility * 0.6, lineMajor) * uOpacity;
    float r = length(p) / (uPlaneSize * 0.5);
    float edgeFade = 1.0 - smoothstep(0.55, 1.0, r);
    a *= edgeFade;
    if (a < 0.001) discard;
    gl_FragColor = vec4(col, a);
  }
`;

const gridMat = new THREE.ShaderMaterial({
  uniforms: {
    uCellSize:   { value: 1.0 },
    uPlaneSize:  { value: 100.0 },
    uLineColor:  { value: new THREE.Color(0x4a5478) },
    uMajorColor: { value: new THREE.Color(0x8b95b8) },
    uOpacity:    { value: 0.55 },
  },
  vertexShader: gridVert,
  fragmentShader: gridFrag,
  transparent: true,
  depthWrite: false,
  side: THREE.DoubleSide,
});
const gridGeo = new THREE.PlaneGeometry(1, 1);
const gridMesh = new THREE.Mesh(gridGeo, gridMat);
gridMesh.rotation.x = -Math.PI / 2;
scene.add(gridMesh);

// Halos
function makeHaloTexture() {
  const size = 256;
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  g.addColorStop(0,    'rgba(255,255,255,1)');
  g.addColorStop(0.2,  'rgba(255,255,255,0.55)');
  g.addColorStop(0.5,  'rgba(255,255,255,0.15)');
  g.addColorStop(1,    'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, size, size);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}
const haloTex = makeHaloTexture();
function makeHalo() {
  const m = new THREE.SpriteMaterial({
    map: haloTex,
    color: 0xffffff,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  return new THREE.Sprite(m);
}
const sunHalo  = makeHalo();
const starHalo = makeHalo();
scene.add(sunHalo, starHalo);

// ---------- Post-processing ----------
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(1, 1), 0.55, 0.40, 0.15);
composer.addPass(bloomPass);

// ---------- State ----------
const state = {
  starT: T_SUN,
  starR: 1.0,
};

const R_BIG = 2.2;

function computeRenderSizes(rUserSun) {
  const q = rUserSun;
  let rSun, rStar;
  if (q >= 1) {
    rStar = R_BIG;
    rSun  = R_BIG / q;
  } else {
    rSun  = R_BIG;
    rStar = R_BIG * q;
  }
  return { rSun, rStar };
}

const GAP_MIN  = 0.35;
const GAP_FRAC = 0.30;

function updateLayout() {
  const { rSun, rStar } = computeRenderSizes(state.starR);
  const sunLum  = 1.0;
  const starLum = state.starR * state.starR * Math.pow(state.starT / T_SUN, 4);
  const haloBoost = (L) => {
    const logL = Math.log10(Math.max(L, 1e-12));
    if (logL >= 0) return 1.0 + logL * 0.40;
    return Math.max(0.35, 1.0 + logL * 0.18);
  };
  const sunBoost  = haloBoost(sunLum);
  const starBoost = haloBoost(starLum);
  const sunHaloRadius  = rSun  * 1.2 * sunBoost;
  const starHaloRadius = rStar * 1.2 * starBoost;
  const bigSurfaceR  = Math.max(rSun, rStar);
  const bigHaloR     = Math.max(rSun, rStar) === rSun ? sunHaloRadius : starHaloRadius;
  const haloClearance = (bigHaloR - bigSurfaceR) * 0.55;
  const gap = Math.max(GAP_MIN, GAP_FRAC * bigSurfaceR, haloClearance);
  const centreSep = rSun + rStar + gap;
  let sunX  = -centreSep / 2;
  let starX =  centreSep / 2;
  const leftEdge  = sunX  - rSun;
  const rightEdge = starX + rStar;
  const shift = -(leftEdge + rightEdge) / 2;
  sunX  += shift;
  starX += shift;
  const totalWidth = rightEdge - leftEdge;

  sun.scale.setScalar(rSun);
  sun.position.x = sunX;
  star.scale.setScalar(rStar);
  star.position.x = starX;

  const sunHaloScale  = rSun  * 2.4 * sunBoost;
  const starHaloScale = rStar * 2.4 * starBoost;
  sunHalo.scale.set(sunHaloScale, sunHaloScale, 1);
  sunHalo.position.set(sunX, 0, 0);
  starHalo.scale.set(starHaloScale, starHaloScale, 1);
  starHalo.position.set(starX, 0, 0);
  sunHalo.userData.boost  = sunBoost;
  starHalo.userData.boost = starBoost;

  const rBig = Math.max(rSun, rStar);
  const planeSize = rBig * 12.0;
  gridMesh.scale.set(planeSize, planeSize, 1);
  gridMesh.position.set((sunX + starX) / 2, -rBig * 1.05, 0);
  gridMat.uniforms.uCellSize.value  = rSun;
  gridMat.uniforms.uPlaneSize.value = planeSize;

  const halfWidth = totalWidth / 2;
  const fovY = camera.fov * Math.PI / 180;
  const aspect = camera.aspect;
  const fovX = 2 * Math.atan(Math.tan(fovY/2) * aspect);
  const distForX = (halfWidth * 1.18) / Math.tan(fovX / 2);
  const distForY = (Math.max(rSun, rStar) * 1.35) / Math.tan(fovY / 2);
  const dist = Math.max(distForX, distForY, 6);
  controls.minDistance = dist * 0.4;
  controls.maxDistance = dist * 4;
  const offset = camera.position.clone().sub(controls.target);
  offset.setLength(dist);
  camera.position.copy(controls.target).add(offset);
  controls.update();
}

function applyColours() {
  const sunRGB = kelvinToRGB(T_SUN);
  sunMat.uniforms.uHot.value.setRGB(sunRGB[0], sunRGB[1], sunRGB[2]);
  sunMat.uniforms.uCool.value.setRGB(sunRGB[0]*0.18, sunRGB[1]*0.18, sunRGB[2]*0.18);

  const rgb = kelvinToRGB(state.starT);
  starMat.uniforms.uHot.value.setRGB(rgb[0], rgb[1], rgb[2]);
  starMat.uniforms.uCool.value.setRGB(rgb[0]*0.18, rgb[1]*0.18, rgb[2]*0.18);

  sunHalo.material.color.setRGB(sunRGB[0], sunRGB[1], sunRGB[2]);
  starHalo.material.color.setRGB(rgb[0], rgb[1], rgb[2]);

  const sunBoost  = sunHalo.userData.boost  ?? 1.0;
  const starBoost = starHalo.userData.boost ?? 1.0;
  sunHalo.material.opacity  = Math.min(1.6, Math.max(0.4, sunBoost  * 0.9 + 0.1));
  starHalo.material.opacity = Math.min(1.6, Math.max(0.4, starBoost * 0.9 + 0.1));

  starMat.uniforms.uIntensity.value = 1.0;
  sunMat.uniforms.uIntensity.value  = 1.0;
}

function fmtSci(x) {
  if (x === 0) return '0';
  const exp = Math.floor(Math.log10(Math.abs(x)));
  const mant = x / Math.pow(10, exp);
  const supers = {'-':'⁻','0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹'};
  const expStr = String(exp).split('').map(ch => supers[ch] || ch).join('');
  return `${mant.toFixed(2)}×10${expStr}`;
}
function fmtRsun(x) {
  if (x >= 100)   return Math.round(x).toLocaleString();
  if (x >= 10)    return x.toFixed(1);
  if (x >= 1)     return x.toFixed(2);
  if (x >= 0.01)  return x.toFixed(3);
  return x.toExponential(2);
}
function fmtLsun(x) {
  if (x >= 1e4)   return fmtSci(x);
  if (x >= 100)   return Math.round(x).toLocaleString();
  if (x >= 10)    return x.toFixed(1);
  if (x >= 1)     return x.toFixed(2);
  if (x >= 0.001) return x.toFixed(4);
  return x.toExponential(2);
}

const $ = id => document.getElementById(id);
function setStats(prefix, T, Rsun) {
  const Rkm  = Rsun * R_SUN_KM;
  const Lsun = Rsun * Rsun * Math.pow(T / T_SUN, 4);
  const LW   = Lsun * L_SUN_W;
  $(`${prefix}-T`).textContent    = Math.round(T).toLocaleString();
  $(`${prefix}-Rkm`).textContent  = fmtSci(Rkm);
  $(`${prefix}-Rsun`).textContent = fmtRsun(Rsun);
  $(`${prefix}-LW`).textContent   = fmtSci(LW);
  $(`${prefix}-Lsun`).textContent = fmtLsun(Lsun);
}

const RAD_MIN = 0.005, RAD_MAX = 2500;
function sliderToRadius(s) {
  const t = s / 1000;
  return RAD_MIN * Math.pow(RAD_MAX / RAD_MIN, t);
}
function radiusToSlider(r) {
  const t = Math.log(r / RAD_MIN) / Math.log(RAD_MAX / RAD_MIN);
  return Math.round(Math.max(0, Math.min(1000, t * 1000)));
}

const tempSlider = document.getElementById('temp');
const radSlider  = document.getElementById('rad');
const tValOut = document.getElementById('tval');
const rValOut = document.getElementById('rval');

function refreshAll() {
  updateLayout();
  applyColours();
  setStats('sun',  T_SUN, 1.0);
  setStats('star', state.starT, state.starR);
  tValOut.textContent = Math.round(state.starT).toLocaleString();
  rValOut.textContent = fmtRsun(state.starR);
}

tempSlider.addEventListener('input', e => {
  state.starT = parseFloat(e.target.value);
  refreshAll();
});
radSlider.addEventListener('input', e => {
  state.starR = sliderToRadius(parseFloat(e.target.value));
  refreshAll();
});
document.querySelectorAll('.preset').forEach(btn => {
  btn.addEventListener('click', () => {
    const t = parseFloat(btn.dataset.t);
    const r = parseFloat(btn.dataset.r);
    state.starT = t;
    state.starR = r;
    tempSlider.value = t;
    radSlider.value = radiusToSlider(r);
    refreshAll();
  });
});

function resize() {
  const rect = viewer.getBoundingClientRect();
  const w = Math.max(1, Math.floor(rect.width));
  const h = Math.max(1, Math.floor(rect.height));
  renderer.setSize(w, h, false);
  composer.setSize(w, h);
  bloomPass.resolution.set(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  refreshAll();
}
window.addEventListener('resize', resize);

radSlider.value = radiusToSlider(state.starR);

const indSun  = document.getElementById('ind-sun');
const indStar = document.getElementById('ind-star');
const _projVec = new THREE.Vector3();

function pixelDiameter(mesh) {
  const rWorld = mesh.scale.x;
  if (rWorld <= 0) return 0;
  const dist = camera.position.distanceTo(mesh.position);
  if (dist <= 0) return Infinity;
  const H = renderer.domElement.clientHeight || viewer.clientHeight || 1;
  const halfFov = (camera.fov * Math.PI / 180) / 2;
  const pxR = (rWorld / dist) / Math.tan(halfFov) * (H / 2);
  return pxR * 2;
}

function projectMeshToScreenPx(mesh) {
  _projVec.copy(mesh.position).project(camera);
  const rect = viewer.getBoundingClientRect();
  return {
    x: (_projVec.x * 0.5 + 0.5) * rect.width,
    y: (-_projVec.y * 0.5 + 0.5) * rect.height,
    onScreen: _projVec.z > -1 && _projVec.z < 1,
  };
}

function updateIndicator(el, mesh, name) {
  const dPx = pixelDiameter(mesh);
  if (dPx >= 10) {
    el.classList.remove('visible');
    return;
  }
  const p = projectMeshToScreenPx(mesh);
  const rect = viewer.getBoundingClientRect();
  const offsetY = 38;
  let ix = p.x;
  let iy = p.y - offsetY;
  ix = Math.max(60, Math.min(rect.width - 60, ix));
  iy = Math.max(28, Math.min(rect.height - 28, iy));
  el.style.left = ix + 'px';
  el.style.top  = iy + 'px';
  const msg = el.querySelector('.msg');
  if (dPx < 1) {
    msg.textContent = `${name} · too small to display!`;
    el.classList.add('invisible-mode');
  } else {
    msg.textContent = `${name} · still here!`;
    el.classList.remove('invisible-mode');
  }
  el.classList.add('visible');
}

function updateIndicators() {
  updateIndicator(indSun,  sun,  'Sun');
  updateIndicator(indStar, star, 'Star');
}

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  sunMat.uniforms.uTime.value  = t;
  starMat.uniforms.uTime.value = t;
  sun.rotation.y  += 0.0015;
  star.rotation.y += 0.0015;
  controls.update();
  composer.render();
  updateIndicators();
}

resize();
refreshAll();
animate();
</script>
</body>
</html>
