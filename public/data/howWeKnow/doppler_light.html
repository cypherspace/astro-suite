<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doppler Effect — Light from a Moving Galaxy</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: radial-gradient(ellipse at center, #0a0420 0%, #02010a 100%);
    color: #e8eef7;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px;
  }
  h1 {
    font-size: 1.8em;
    margin-bottom: 8px;
    background: linear-gradient(90deg, #ff5252, #ffffff, #4fc3f7);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    font-size: 0.95em;
    color: #95a5b8;
    margin-bottom: 16px;
  }
  canvas {
    background: #02010a;
    border-radius: 12px;
    border: 1px solid #2a1a4a;
    box-shadow: 0 8px 32px rgba(80,40,200,0.2);
    max-width: 100%;
    height: auto;
  }
  .controls {
    margin-top: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.04);
    padding: 14px 20px;
    border-radius: 10px;
    border: 1px solid #2a1a4a;
  }
  .control-group {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  label {
    font-size: 0.9em;
    color: #b8c5d6;
  }
  input[type="range"] {
    width: 160px;
    accent-color: #b388ff;
  }
  .speed-readout {
    display: inline-block;
    width: 70px;
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
  }
  button {
    background: linear-gradient(135deg, #b388ff, #7c4dff);
    color: #ffffff;
    border: none;
    padding: 8px 18px;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s;
  }
  button:hover { transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  .legend {
    margin-top: 14px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
    font-size: 0.85em;
    color: #b8c5d6;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .swatch {
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid;
  }
  .info {
    margin-top: 12px;
    font-size: 0.85em;
    color: #95a5b8;
    max-width: 720px;
    text-align: center;
    line-height: 1.5;
  }
  .freq-display {
    display: flex;
    gap: 30px;
    margin-top: 10px;
    font-size: 0.95em;
    flex-wrap: wrap;
    justify-content: center;
  }
  .freq-box {
    padding: 6px 14px;
    border-radius: 6px;
    background: rgba(255,255,255,0.05);
  }
  .freq-high { color: #4fc3f7; border-left: 3px solid #4fc3f7; }
  .freq-low { color: #ff5252; border-left: 3px solid #ff5252; }

  .spectrum-stack {
    margin-top: 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid #2a1a4a;
    border-radius: 8px;
    padding: 14px 24px;
    display: inline-block;
  }
  .spectrum-stack canvas {
    display: block;
    background: transparent;
    box-shadow: none;
    border: none;
    border-radius: 0;
  }
  .spectrum-labels-wide {
    display: flex;
    justify-content: space-between;
    width: 580px;
    margin-left: 130px;
    font-size: 0.7em;
    color: #95a5b8;
    margin-top: 4px;
  }
  .spectrum-toggle {
    margin-top: 14px;
    display: flex;
    gap: 8px;
    justify-content: center;
  }
  .spectrum-toggle button {
    background: rgba(255,255,255,0.06);
    color: #b8c5d6;
    border: 1px solid #2a1a4a;
    font-weight: 500;
  }
  .spectrum-toggle button.active {
    background: linear-gradient(135deg, #b388ff, #7c4dff);
    color: #fff;
    border-color: transparent;
  }
</style>
</head>
<body>
  <canvas id="canvas" width="900" height="400"></canvas>

  <div class="freq-display">
    <div class="freq-box freq-high">Ahead (observer right): <span id="freqAhead">—</span> × f₀ &nbsp;<em style="color:#95a5b8;font-size:0.85em">(blueshift)</em></div>
    <div class="freq-box freq-low">Behind (observer left): <span id="freqBehind">—</span> × f₀ &nbsp;<em style="color:#95a5b8;font-size:0.85em">(redshift)</em></div>
  </div>

  <div class="spectrum-toggle">
    <button id="modeEmission" class="active">Emission spectrum</button>
    <button id="modeAbsorption">Absorption spectrum</button>
  </div>

  <div class="spectrum-stack">
    <canvas id="specStack" width="720" height="280"></canvas>
    <div class="spectrum-labels-wide"><span>400 nm</span><span>500 nm</span><span>600 nm</span><span>700 nm</span></div>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>Galaxy speed:</label>
      <input type="range" id="speedSlider" min="0" max="300000" step="1000" value="60000">
      <span id="speedVal" class="speed-readout">60,000</span> km/s
    </div>
    <button id="resetBtn">Reset</button>
    <button id="pauseBtn">Pause</button>
  </div>

  <div class="legend">
    <div class="legend-item"><span class="swatch" style="border-color:#4fc3f7;"></span>Compressed wavefronts → blueshift (higher frequency)</div>
    <div class="legend-item"><span class="swatch" style="border-color:#ff5252;"></span>Stretched wavefronts → redshift (lower frequency)</div>
  </div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

const speedSlider = document.getElementById('speedSlider');
const speedVal = document.getElementById('speedVal');
const resetBtn = document.getElementById('resetBtn');
const pauseBtn = document.getElementById('pauseBtn');
const freqAhead = document.getElementById('freqAhead');
const freqBehind = document.getElementById('freqBehind');
const specCanvas = document.getElementById('specStack');
const specCtx = specCanvas.getContext('2d');
const modeEmissionBtn = document.getElementById('modeEmission');
const modeAbsorptionBtn = document.getElementById('modeAbsorption');

// Real physical constant (km/s) — used for Doppler ratio f' = f * c / (c - v)
const C_KMS = 299792;
// Visual wave speed on the canvas (px/s). The slider is in km/s for the
// physics calculation, but on-screen wavefronts move at this fixed pace
// so the animation stays watchable at any speed setting.
const VISUAL_C_PXS = 200;
// Maximum visual scaling: when the slider is at c (300,000 km/s) the source
// would *catch* its own wavefronts, so map the slider to a fraction of VISUAL_C_PXS.
const MAX_VISUAL_FRACTION = 0.95;

const EMIT_FREQ = 2; // Hz — fixed on-screen emission rate

// Hydrogen Balmer lines (visible, in nm) with their approximate displayed colours
const HYDROGEN_LINES = [
  { wl: 410, color: '#8b5cf6', name: 'Hδ' }, // violet
  { wl: 434, color: '#4f6dff', name: 'Hγ' }, // blue
  { wl: 486, color: '#22d3ee', name: 'Hβ' }, // cyan/aqua
  { wl: 656, color: '#ef4444', name: 'Hα' }  // red
];

let sourceSpeedKms = parseFloat(speedSlider.value);
let sourceX = 150;
const sourceY = H / 2;
let waves = [];
let lastEmit = 0;
let paused = false;
let lastTime = performance.now();
let spectrumMode = 'emission'; // or 'absorption'

const observers = [
  { x: 60,  y: H / 2 },
  { x: W - 60, y: H / 2 }
];

// Generate a fixed starfield
const stars = [];
for (let i = 0; i < 220; i++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.2 + 0.2,
    tw: Math.random() * Math.PI * 2
  });
}

function reset() {
  sourceX = 150;
  waves = [];
  lastEmit = 0;
}

function formatKms(v) {
  return v.toLocaleString('en-GB');
}

// Convert slider km/s to on-screen pixel speed
function visualSpeedPxs() {
  const frac = sourceSpeedKms / C_KMS;
  return frac * VISUAL_C_PXS * MAX_VISUAL_FRACTION;
}

speedSlider.oninput = () => {
  sourceSpeedKms = parseFloat(speedSlider.value);
  speedVal.textContent = formatKms(sourceSpeedKms);
};
resetBtn.onclick = reset;
pauseBtn.onclick = () => {
  paused = !paused;
  pauseBtn.textContent = paused ? 'Play' : 'Pause';
  if (!paused) lastTime = performance.now();
};
modeEmissionBtn.onclick = () => {
  spectrumMode = 'emission';
  modeEmissionBtn.classList.add('active');
  modeAbsorptionBtn.classList.remove('active');
};
modeAbsorptionBtn.onclick = () => {
  spectrumMode = 'absorption';
  modeAbsorptionBtn.classList.add('active');
  modeEmissionBtn.classList.remove('active');
};

function drawStars(now) {
  for (const s of stars) {
    const flicker = 0.6 + 0.4 * Math.sin(now / 600 + s.tw);
    ctx.fillStyle = `rgba(255,255,255,${flicker * 0.8})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawGalaxy(x, y, now) {
  ctx.save();
  ctx.translate(x, y);
  // slow rotation
  const rot = now / 4000;
  ctx.rotate(rot);

  // outer halo
  const halo = ctx.createRadialGradient(0, 0, 4, 0, 0, 36);
  halo.addColorStop(0, 'rgba(255, 230, 180, 0.9)');
  halo.addColorStop(0.3, 'rgba(255, 180, 120, 0.5)');
  halo.addColorStop(0.7, 'rgba(180, 120, 220, 0.25)');
  halo.addColorStop(1, 'rgba(80, 40, 160, 0)');
  ctx.fillStyle = halo;
  ctx.beginPath();
  ctx.ellipse(0, 0, 36, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  // spiral arms (two)
  ctx.strokeStyle = 'rgba(180, 200, 255, 0.5)';
  ctx.lineWidth = 2;
  for (let arm = 0; arm < 2; arm++) {
    ctx.beginPath();
    for (let t = 0; t < 2.5; t += 0.05) {
      const r = t * 11;
      const a = t * 1.4 + arm * Math.PI;
      const px = Math.cos(a) * r;
      const py = Math.sin(a) * r * 0.4;
      if (t === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
  }

  // dotted stars in arms
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  for (let arm = 0; arm < 2; arm++) {
    for (let t = 0.2; t < 2.5; t += 0.2) {
      const r = t * 11;
      const a = t * 1.4 + arm * Math.PI;
      const px = Math.cos(a) * r;
      const py = Math.sin(a) * r * 0.4;
      ctx.beginPath();
      ctx.arc(px, py, 0.9, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // bright core
  const core = ctx.createRadialGradient(0, 0, 0, 0, 0, 8);
  core.addColorStop(0, 'rgba(255, 255, 230, 1)');
  core.addColorStop(0.5, 'rgba(255, 220, 150, 0.9)');
  core.addColorStop(1, 'rgba(255, 150, 80, 0)');
  ctx.fillStyle = core;
  ctx.beginPath();
  ctx.arc(0, 0, 8, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawObserver(x, y) {
  // little telescope/eye icon
  ctx.font = '24px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🔭', x, y + 4);
}

// Returns observed/emitted frequency RATIO using classical Doppler.
// (Good approximation; for a teaching artifact we keep it simple. At the
// extreme end of the slider it diverges as v → c, which is itself instructive.)
function observedFrequencyRatio(observerX) {
  const dx = observerX - sourceX;
  if (Math.abs(dx) < 1) return 1;
  const vTowardObs = sourceSpeedKms * Math.sign(dx);
  // Avoid division blowup at exactly v = c
  const denom = Math.max(1, C_KMS - vTowardObs);
  return C_KMS / denom;
}

function update(dt) {
  const vPxs = visualSpeedPxs();
  sourceX += vPxs * dt;
  if (sourceX > W - 100) {
    sourceX = 150;
    waves = [];
  }
  lastEmit += dt;
  const emitInterval = 1 / EMIT_FREQ;
  while (lastEmit >= emitInterval) {
    lastEmit -= emitInterval;
    waves.push({ x0: sourceX, y0: sourceY, t0: 0 });
  }
  for (const w of waves) w.t0 += dt;
  waves = waves.filter(w => w.t0 * VISUAL_C_PXS < W * 1.5);
}

function draw(now) {
  // space background
  ctx.fillStyle = '#02010a';
  ctx.fillRect(0, 0, W, H);
  drawStars(now);

  // wavefronts
  for (const w of waves) {
    const r = w.t0 * VISUAL_C_PXS;
    if (r < 1) continue;
    const alpha = Math.max(0, 1 - w.t0 / 4);
    ctx.lineWidth = 1.8;

    // ahead (right half) — compressed → BLUE (blueshift)
    ctx.strokeStyle = `rgba(79, 195, 247, ${alpha})`;
    ctx.beginPath();
    ctx.arc(w.x0, w.y0, r, -Math.PI / 2, Math.PI / 2);
    ctx.stroke();

    // behind (left half) — stretched → RED (redshift)
    ctx.strokeStyle = `rgba(255, 82, 82, ${alpha})`;
    ctx.beginPath();
    ctx.arc(w.x0, w.y0, r, Math.PI / 2, -Math.PI / 2);
    ctx.stroke();
  }

  // observers
  for (const o of observers) drawObserver(o.x, o.y);

  // galaxy
  drawGalaxy(sourceX, sourceY, now);

  // velocity arrow
  if (sourceSpeedKms > 5000) {
    ctx.strokeStyle = '#ffeb3b';
    ctx.fillStyle = '#ffeb3b';
    ctx.lineWidth = 2;
    const ax = sourceX + 40;
    const ay = sourceY - 32;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax + 30, ay);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(ax + 30, ay);
    ctx.lineTo(ax + 24, ay - 4);
    ctx.lineTo(ax + 24, ay + 4);
    ctx.closePath();
    ctx.fill();
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('v', ax + 34, ay + 4);
  }

  // numeric ratio readout
  const ratioAhead = observedFrequencyRatio(observers[1].x);
  const ratioBehind = observedFrequencyRatio(observers[0].x);
  freqAhead.textContent = ratioAhead.toFixed(3);
  freqBehind.textContent = ratioBehind.toFixed(3);

  // hydrogen spectra (combined: redshift / lab / blueshift, vertically aligned)
  drawSpectraStack(ratioBehind, ratioAhead);
}

// Map a wavelength in nm (400–700) to an x-pixel on a spectrum canvas
function wavelengthToX(wlNm, canvasWidth) {
  const wlMin = 400, wlMax = 700;
  const t = (wlNm - wlMin) / (wlMax - wlMin);
  return Math.max(0, Math.min(1, t)) * canvasWidth;
}

// Map a wavelength to an approximate visible RGB colour (for absorption rainbow background)
function wavelengthToRGB(wl) {
  let r, g, b;
  if (wl >= 380 && wl < 440) { r = -(wl - 440) / 60; g = 0; b = 1; }
  else if (wl < 490)         { r = 0; g = (wl - 440) / 50; b = 1; }
  else if (wl < 510)         { r = 0; g = 1; b = -(wl - 510) / 20; }
  else if (wl < 580)         { r = (wl - 510) / 70; g = 1; b = 0; }
  else if (wl < 645)         { r = 1; g = -(wl - 645) / 65; b = 0; }
  else if (wl <= 780)        { r = 1; g = 0; b = 0; }
  else                       { r = 0; g = 0; b = 0; }
  // soft falloff at edges
  let factor = 1;
  if (wl < 420) factor = 0.3 + 0.7 * (wl - 380) / 40;
  else if (wl > 700) factor = 0.3 + 0.7 * (780 - wl) / 80;
  return [Math.round(r * 255 * factor), Math.round(g * 255 * factor), Math.round(b * 255 * factor)];
}

// Draw a single spectrum band (background + lines for one ratio) at a given y offset
function drawSpectrumBand(c2d, x0, y0, w, h, ratio) {
  if (spectrumMode === 'emission') {
    c2d.fillStyle = '#000';
    c2d.fillRect(x0, y0, w, h);
  } else {
    const grad = c2d.createLinearGradient(x0, 0, x0 + w, 0);
    for (let i = 0; i <= 20; i++) {
      const t = i / 20;
      const wl = 400 + t * 300;
      const [r, g, b] = wavelengthToRGB(wl);
      grad.addColorStop(t, `rgb(${r},${g},${b})`);
    }
    c2d.fillStyle = grad;
    c2d.fillRect(x0, y0, w, h);
  }

  // subtle border
  c2d.strokeStyle = 'rgba(255,255,255,0.18)';
  c2d.lineWidth = 1;
  c2d.strokeRect(x0 + 0.5, y0 + 0.5, w - 1, h - 1);

  // Draw each Balmer line at its shifted wavelength.
  // Observed wavelength λ' = λ₀ / ratio
  for (const line of HYDROGEN_LINES) {
    const wlObs = line.wl / ratio;
    if (wlObs < 400 || wlObs > 700) continue;
    const x = x0 + wavelengthToX(wlObs, w);

    if (spectrumMode === 'emission') {
      // colour reflects the observed (shifted) wavelength, not the rest one
      const [rr, gg, bb] = wavelengthToRGB(wlObs);
      const col = `rgb(${rr},${gg},${bb})`;
      c2d.strokeStyle = col;
      c2d.lineWidth = 2.5;
      c2d.shadowColor = col;
      c2d.shadowBlur = 6;
      c2d.beginPath();
      c2d.moveTo(x, y0);
      c2d.lineTo(x, y0 + h);
      c2d.stroke();
      c2d.shadowBlur = 0;
    } else {
      c2d.strokeStyle = '#000';
      c2d.lineWidth = 2.5;
      c2d.beginPath();
      c2d.moveTo(x, y0);
      c2d.lineTo(x, y0 + h);
      c2d.stroke();
    }
  }
}

// Compute the on-canvas x-position of an observed line for a given rest wavelength + ratio
function lineXForRatio(wlRest, ratio, x0, w) {
  const wlObs = wlRest / ratio;
  return x0 + wavelengthToX(wlObs, w);
}

// Draw a small horizontal arrow head at (x, y) pointing in `dir` ('left' or 'right')
function drawArrowhead(c2d, x, y, dir, color) {
  const size = 5;
  const dx = dir === 'right' ? -size : size;
  c2d.fillStyle = color;
  c2d.beginPath();
  c2d.moveTo(x, y);
  c2d.lineTo(x + dx, y - size * 0.6);
  c2d.lineTo(x + dx, y + size * 0.6);
  c2d.closePath();
  c2d.fill();
}

// Master draw: three spectra stacked vertically with reference lines and shift arrows
function drawSpectraStack(ratioRed, ratioBlue) {
  const c2d = specCtx;
  const W2 = specCanvas.width;
  const H2 = specCanvas.height;

  // clear
  c2d.clearRect(0, 0, W2, H2);

  // Layout: three spectrum bands of equal width, with arrow gaps between them
  const padX = 130;           // leaves room for labels on the left
  const bandX = padX;
  const bandW = W2 - padX - 10;
  const bandH = 50;
  const gap = 32;             // vertical gap between bands (where arrows live)

  const yRed  = 10;
  const yLab  = yRed + bandH + gap;
  const yBlue = yLab + bandH + gap;

  // Labels on the left
  c2d.fillStyle = '#b8c5d6';
  c2d.font = 'bold 11px sans-serif';
  c2d.textAlign = 'right';
  c2d.textBaseline = 'middle';
  c2d.fillText('REDSHIFTED',  bandX - 8, yRed  + bandH / 2);
  c2d.fillText('LAB (REST)',  bandX - 8, yLab  + bandH / 2);
  c2d.fillText('BLUESHIFTED', bandX - 8, yBlue + bandH / 2);

  c2d.font = '9px sans-serif';
  c2d.fillStyle = '#95a5b8';
  c2d.fillText('receding',   bandX - 8, yRed  + bandH / 2 + 14);
  c2d.fillText('reference',  bandX - 8, yLab  + bandH / 2 + 14);
  c2d.fillText('approaching',bandX - 8, yBlue + bandH / 2 + 14);

  // Draw the three bands
  drawSpectrumBand(c2d, bandX, yRed,  bandW, bandH, ratioRed);  // redshifted (ratio < 1)
  drawSpectrumBand(c2d, bandX, yLab,  bandW, bandH, 1);          // unshifted lab reference
  drawSpectrumBand(c2d, bandX, yBlue, bandW, bandH, ratioBlue); // blueshifted (ratio > 1)

  // Reference dotted lines extending from each lab line, up into redshift gap
  // and down into blueshift gap. Then arrows from reference → observed line.
  for (let i = 0; i < HYDROGEN_LINES.length; i++) {
    const line = HYDROGEN_LINES[i];
    const xLab = lineXForRatio(line.wl, 1, bandX, bandW);

    // Stagger each line's arrow vertically within the gap so overlapping
    // shifts remain distinguishable. Spread across the central ~60% of the gap.
    const n = HYDROGEN_LINES.length;
    const spread = gap * 0.55;
    const offset = (i - (n - 1) / 2) * (spread / Math.max(1, n - 1));

    // dotted reference line (vertical, only in the gaps above and below the lab band)
    c2d.strokeStyle = 'rgba(255,255,255,0.45)';
    c2d.lineWidth = 1;
    c2d.setLineDash([3, 3]);
    c2d.beginPath();
    // upward into red-gap
    c2d.moveTo(xLab, yRed + bandH);
    c2d.lineTo(xLab, yLab);
    // downward into blue-gap
    c2d.moveTo(xLab, yLab + bandH);
    c2d.lineTo(xLab, yBlue);
    c2d.stroke();
    c2d.setLineDash([]);

    // --- Arrow showing redshift (red band): from reference x → observed x ---
    const xRedObs = lineXForRatio(line.wl, ratioRed, bandX, bandW);
    const wlRedObs = line.wl / ratioRed;
    if (wlRedObs >= 400 && wlRedObs <= 700 && Math.abs(xRedObs - xLab) > 2) {
      const yArrow = yRed + bandH + gap / 2 + offset;
      c2d.strokeStyle = '#ffffff';
      c2d.lineWidth = 1.4;
      c2d.beginPath();
      c2d.moveTo(xLab, yArrow);
      c2d.lineTo(xRedObs, yArrow);
      c2d.stroke();
      drawArrowhead(c2d, xRedObs, yArrow, xRedObs > xLab ? 'right' : 'left', '#ffffff');
    }

    // --- Arrow showing blueshift (blue band): from reference x → observed x ---
    const xBlueObs = lineXForRatio(line.wl, ratioBlue, bandX, bandW);
    const wlBlueObs = line.wl / ratioBlue;
    if (wlBlueObs >= 400 && wlBlueObs <= 700 && Math.abs(xBlueObs - xLab) > 2) {
      const yArrow = yLab + bandH + gap / 2 + offset;
      c2d.strokeStyle = '#ffffff';
      c2d.lineWidth = 1.4;
      c2d.beginPath();
      c2d.moveTo(xLab, yArrow);
      c2d.lineTo(xBlueObs, yArrow);
      c2d.stroke();
      drawArrowhead(c2d, xBlueObs, yArrow, xBlueObs > xLab ? 'right' : 'left', '#ffffff');
    }
  }
}

function loop(now) {
  const dt = Math.min(0.05, (now - lastTime) / 1000);
  lastTime = now;
  if (!paused) update(dt);
  draw(now);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
